<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f6f8;
        color: #222;
        margin: 0;
        padding: 0;
      }
      .wrap {
        max-width: 720px;
        margin: 80px auto;
        padding: 24px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.6;
      }
      .meta {
        margin-top: 16px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Welcome</h1>
      <p>This service is up and running.</p>
      <p>If you reached this page by mistake, you can safely close it.</p>
      <div class="meta">Status: OK</div>
    </div>

</html>
